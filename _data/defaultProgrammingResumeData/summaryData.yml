summaryData:
    summary: Results-driven Junior Software Developer proficient in OOP, passionate about tackling 
      complex problems and delivering creative solutions. Drove full-cycle Unity3D development, 
      rapidly mastering a complex C# codebase to implement system-wide refactors and data-driven 
      optimizations, closely collaborating in Agile workflows to define technical requirements. 
      Independently engineered a message router in Java/Spring Boot and Apache Camel, proactively 
      building a modular, adaptable architecture to address future use cases and fault lines, 
      secured with an embedded SQL database and comprehensive JUnit test coverage. Eager to 
      contribute to a dynamic development team, tackle real-world engineering challenges, and 
      grow alongside industry veterans.